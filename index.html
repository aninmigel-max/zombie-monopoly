<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zombie Monopoly</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <header class="header">
        <div class="balance-box">
            <span class="icon">💰</span>
            <span id="balance">2000</span>$
        </div>
        <div class="income-box">
            <span class="icon">📈</span>
            <span id="income">0</span>$/час
        </div>
    </header>

    <main class="game-area">
        <div class="board-container">
            <canvas id="gameCanvas"></canvas>
            <div class="center-overlay">
                <div id="toast" class="toast">Твой ход!</div>
                <div id="dice-container" class="dice-box"></div>
                <button id="rollBtn" class="main-btn">Бросить кубик</button>
            </div>
        </div>
    </main>

    <div id="city-screen" class="screen hidden">
        <div class="screen-header">
            <button class="back-btn" onclick="setTab('game', null)" style="background:none; border:none; color:white; font-size:30px; line-height:1; cursor:pointer;">&#8592;</button>
            <h2>🏗 Твой Город</h2>
        </div>
        <div id="buildings-list" class="scroll-content"></div>
    </div>

    <div id="cases-screen" class="screen hidden">
        <div class="screen-header">
            <h2>📦 Кейсы</h2>
        </div>
        <div class="scroll-content">
            <div class="case-subscribe-hint" id="case-hint">
                🎁 Подпишись на наш Telegram-канал и получи кейс бесплатно!
            </div>
            <div class="case-card" id="sub-case">
                <div class="case-icon">🧟</div>
                <div class="case-name">Кейс Выжившего</div>
                <div class="case-desc">Внутри случайный подарок от зомби-апокалипсиса</div>
                <div class="case-count" id="case-count-display"></div>
                <button class="case-open-btn" id="caseOpenBtn" onclick="openSubscribeCase()">
                    📺 Подписаться и получить
                </button>
            </div>
        </div>
    </div>
</div>

<!-- НАВИГАЦИЯ — вне .app, fixed внизу -->
<nav class="bottom-nav">
    <button class="nav-btn active" onclick="setTab('game', this)">
        <span>🎲</span>
        <span class="nav-label">Игра</span>
    </button>
    <button class="nav-btn" onclick="setTab('city', this)">
        <span>🏙</span>
        <span class="nav-label">Город</span>
    </button>
    <button class="nav-btn" onclick="setTab('cases', this)">
        <span>📦</span>
        <span class="nav-label">Кейс</span>
    </button>
</nav>

<!-- МОДАЛКИ -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modal-title">Заголовок</h3>
        <p id="modal-text">Текст</p>
        <button onclick="closeModal()">ОК</button>
    </div>
</div>

<div id="case-opening-modal" class="modal hidden">
    <div class="modal-content case-opening-content">
        <div id="case-anim-box" class="case-anim-box">
            <div class="case-anim-icon">📦</div>
        </div>
        <h3 id="case-result-title" class="case-result-title"></h3>
        <p id="case-result-text" class="case-result-text"></p>
        <button onclick="closeCaseModal()">Забрать!</button>
    </div>
</div>

<div id="minigame-menu" class="modal hidden">
  <div class="modal-content">
    <h3>🎮 Мини-игры</h3>
    <div id="minigame-list"></div>
    <button onclick="closeMinigameMenu()">Закрыть</button>
  </div>
</div>

<div id="memory-game" class="modal hidden">
  <div class="modal-content">
    <h3 id="memory-level">Уровень 1</h3>
    <div id="memory-grid" class="memory-grid"></div>
    <p id="memory-status"></p>
    <button onclick="exitMemoryGame()">Выйти</button>
  </div>
</div>

<div id="math-game" class="modal hidden">
  <div class="modal-content math-modal">
    <div class="math-timer-top">
      <div id="math-timer-bar" class="math-timer-bar"></div>
    </div>
    <div class="math-top">
      <div id="math-level">Уровень 1 / 5</div>
    </div>
    <div id="math-question" class="math-question">2 + 2 = ?</div>
    <div id="math-answers" class="math-answers"></div>
    <p id="math-status" class="math-status"></p>
    <button onclick="exitMathGame()">Выйти</button>
  </div>
</div>

<div id="odd-game" class="modal hidden">
  <div class="modal-content odd-modal">
    <div class="odd-timer-top">
      <div id="odd-timer-bar"></div>
    </div>
    <div id="odd-level" class="odd-level">Уровень 1 / 5</div>
    <div class="odd-question">Найди лишнее слово</div>
    <div id="odd-answers" class="odd-answers"></div>
    <div id="odd-status" class="odd-status"></div>
    <button class="exit-btn" onclick="exitOddGame()">Выйти</button>
  </div>
</div>

<div id="maze-game" class="modal hidden">
  <div class="modal-content maze-modal">
    <div class="maze-header">
      <span>🧩 Лабиринт</span>
    </div>
    <canvas id="mazeCanvas"></canvas>
    <div class="joystick">
      <button onclick="movePlayer(0,-1)">⬆️</button>
      <div>
        <button onclick="movePlayer(-1,0)">⬅️</button>
        <button onclick="movePlayer(1,0)">➡️</button>
      </div>
      <button onclick="movePlayer(0,1)">⬇️</button>
    </div>
    <button onclick="exitMazeGame()">Выйти</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
